name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-unknown-linux-gnu, riscv64gc-unknown-linux-gnu, loongarch64-unknown-linux-gnu

      - name: Build (x86_64)
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --verbose

      # Compile-check the non-x86_64 syscall paths (src/sys.rs) without a cross linker.
      - name: Check (aarch64)
        run: cargo check --target aarch64-unknown-linux-gnu --verbose

      - name: Check (riscv64)
        run: cargo check --target riscv64gc-unknown-linux-gnu --verbose

      - name: Check (loongarch64)
        run: cargo check --target loongarch64-unknown-linux-gnu --verbose

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
